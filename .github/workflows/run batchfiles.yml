name: Build and Package

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  run-scripts:
    name: Execute Batch Scripts
    runs-on: windows-latest
    permissions:
      contents: write # Required to push changes back to the repo
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0 # Fetches all history for all branches and tags

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"

    - name: Install Project Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install cffi

    - name: Run Assembly Build
      # Updated to your renamed batch file
      run: .\comp.bat

    - name: Run Packaging Script
      run: .\zip.bat

    - name: Commit and Push Changes
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        
        # Add the specific files generated by your batch scripts
        git add bf16/*.dll
        git add *.zip
        
        # Only commit and push if there are actual changes to avoid errors
        git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-build: Update binaries and package" && git push)

    - name: Upload Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: bf16-build-output
        path: |
          bf16/*.dll
          *.zip
